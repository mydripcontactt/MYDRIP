<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>
      Mark 02 — MYDRIP
    </title>
    <link rel="stylesheet" href="mydrip.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="mydrip.html">
        MY
        <span>
          DRIP
        </span>
      </a>
      <nav class="site-nav">
        <a href="mydrip.html#shop">
          Shop
        </a>
        <a href="mydrip.html#about">
          Our story
        </a>
        <a class="cart-link" href="checkout.html">
          Bag
          <b class="cart-count" data-cart-count>
            0
          </b>
        </a>
      </nav>
    </header>
    <main class="page-main">
      <div class="product-page">
        <p class="breadcrumb">
          <a href="mydrip.html#shop">
            Shop
          </a>
          / Mark 02
        </p>
        <div class="product-layout">
          <div class="product-photo">
            <img src="MARK_2_JI.png" alt="MYDRIP Mark 02 oversized T-shirt">
          </div>
          <div class="product-info">
            <p class="eyebrow">
              First drop / Mark 02
            </p>
            <h1>
              Mark 02
              <br>
              Oversized T-shirt
            </h1>
            <p class="product-price">
              ₹899
            </p>
            <p class="product-description">
              An easy statement layer with the same relaxed MYDRIP fit. A limited-release tee made for repeat rotation.
            </p>
            <div class="product-form" data-product-form data-product='{"id":"mark-02","name":"Mark 02 Oversized T-shirt","price":899}'>
              <label class="field-label" for="size">
                Select size
              </label>
              <select id="size" name="size">
                <option>
                  Small
                </option>
                <option selected>
                  Medium
                </option>
                <option>
                  Large
                </option>
                <option>
                  XL
                </option>
              </select>
              <label class="field-label" for="quantity">
                Quantity
              </label>
              <input id="quantity" name="quantity" type="number" min="1" value="1">
              <div class="product-actions">
                <button class="button button-outline" type="button" data-add-cart>
                  Add to bag
                </button>
                <button class="button" type="button" data-buy-now>
                  Buy now
                </button>
              </div>
            </div>
            <p class="product-note">
              Shipping and taxes are calculated at checkout.
            </p>
          </div>
        </div>
      </div>
    </main>
    <footer class="site-footer">
      <span>
        © 2026 MYDRIP
      </span>
      <span>
        Made in India
      </span>
    </footer>
    <div class="toast" role="status" aria-live="polite">
    </div>
    <script src="mydrip.js">
    </script>
  </body>
</html>
